{% extends "base.html" %}

{% block title %}Editar Salário - Controle Real{% endblock %}

{% block page_header %}
    <div class="d-flex justify-content-between align-items-center">
        <h1 class="h3 mb-0">
            <i class="bi bi-pencil-square me-2"></i>Editar Salário
        </h1>
        <small class="text-muted">Atualize o valor do seu salário bruto</small>
    </div>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">

                <!-- Formulário de edição -->
                <form method="POST" id="form-editar">
                    <div class="mb-3">
                        <label for="bruto" class="form-label">Salário Bruto (R$)</label>
                        <input type="number" step="0.01" class="form-control"
                               id="bruto" name="bruto"
                               value="{{ salario.bruto }}" required>
                    </div>
                    <div class="mb-4">
                        <small class="text-muted">O salário líquido será recalculado automaticamente.</small>
                    </div>
                </form>

                <!-- Formulário de exclusão — completamente separado do form de edição -->
                <form method="POST" id="form-excluir">
                    <input type="hidden" name="delete" value="1">
                </form>

                <!-- Botões: cada um aponta para seu próprio form via atributo form="" -->
                <div class="d-flex gap-2 align-items-center">
                    <button type="submit" form="form-editar" class="btn btn-primary">
                        <i class="bi bi-save me-2"></i>Salvar Alterações
                    </button>
                    <button type="submit" form="form-excluir" class="btn btn-danger"
                            onclick="return confirm('Tem certeza que deseja remover o salário cadastrado?')">
                        <i class="bi bi-trash me-2"></i>Excluir
                    </button>
                    <a href="{{ url_for('salary.salary') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left-circle me-2"></i>Voltar
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
