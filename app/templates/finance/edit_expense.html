{% extends "base.html" %}

{% block title %}Editar Despesa - Controle Real{% endblock %}

{% block page_header %}
    <div class="d-flex justify-content-between align-items-center">
        <h1 class="h3 mb-0">
            <i class="bi bi-pencil-square me-2"></i>Editar Despesa
        </h1>
        <small class="text-muted">Atualize ou exclua esta despesa</small>
    </div>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Despesa</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="valor" class="form-label">Valor (R$)</label>
                        <input type="number" step="0.01" class="form-control" id="valor" name="valor" value="{{ "%.2f"|format(expense.valor) }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="categoria" class="form-label">Categoria</label>
                        <input type="text" class="form-control" id="categoria" name="categoria" value="{{ expense.categoria }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição</label>
                        <input type="text" class="form-control" id="descricao" name="descricao" value="{{ expense.descricao }}">
                    </div>

                    <div class="d-flex gap-2 align-items-center">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-2"></i>Salvar
                        </button>

                        <!-- Delete form inline to keep order Salvar, Excluir, Voltar -->
                        <form method="POST" class="m-0">
                            <input type="hidden" name="delete" value="1">
                            <button type="submit" class="btn btn-danger" onclick="return confirm('Tem certeza que deseja excluir esta despesa?');">
                                <i class="bi bi-trash me-2"></i>Excluir
                            </button>
                        </form>

                        <a href="{{ url_for('finance.expenses') }}" class="btn btn-outline-secondary">Voltar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
