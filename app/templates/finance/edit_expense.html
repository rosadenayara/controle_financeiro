{% extends "base.html" %}

{% block title %}Editar Despesa - Controle Real{% endblock %}

{% block page_header %}
    <div class="d-flex justify-content-between align-items-center">
        <h1 class="h3 mb-0">
            <i class="bi bi-pencil-square me-2"></i>Editar Despesa
        </h1>
        <small class="text-muted">Atualize ou exclua esta despesa</small>
    </div>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Despesa</h5>
            </div>
            <div class="card-body">

                <!-- Formulário de edição -->
                <form method="POST" id="form-editar">
                    <div class="mb-3">
                        <label for="valor" class="form-label">Valor (R$)</label>
                        <input type="number" step="0.01" class="form-control"
                               id="valor" name="valor"
                               value="{{ "%.2f"|format(expense.valor) }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="categoria" class="form-label">Categoria</label>
                        <input type="text" class="form-control"
                               id="categoria" name="categoria"
                               value="{{ expense.categoria }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição</label>
                        <input type="text" class="form-control"
                               id="descricao" name="descricao"
                               value="{{ expense.descricao }}">
                    </div>
                </form>

                <!-- Formulário de exclusão — completamente separado do form de edição -->
                <form method="POST" id="form-excluir">
                    <input type="hidden" name="delete" value="1">
                </form>

                <!-- Botões: cada um aponta para seu próprio form via atributo form="" -->
                <div class="d-flex gap-2 align-items-center">
                    <button type="submit" form="form-editar" class="btn btn-primary">
                        <i class="bi bi-check-circle me-2"></i>Salvar
                    </button>
                    <button type="submit" form="form-excluir" class="btn btn-danger"
                            onclick="return confirm('Tem certeza que deseja excluir esta despesa?')">
                        <i class="bi bi-trash me-2"></i>Excluir
                    </button>
                    <a href="{{ url_for('finance.expenses') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-2"></i>Voltar
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
